<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie — Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f9f7; --text: #1a1a18; --secondary: #6b6b68;
            --border: #e5e5e1; --accent: #d97757; --mono: 'IBM Plex Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: var(--mono); min-height: 100vh;
            display: flex; flex-direction: column;
        }
        nav {
            padding: 18px 40px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-logo { font-size: 13px; font-weight: 600; color: var(--accent); text-decoration: none; }
        .nav-back { font-size: 11px; color: var(--secondary); text-decoration: none; }
        .nav-back:hover { color: var(--accent); }
        .wrap {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }
        .box { width: 100%; max-width: 420px; }
        .box-tag { font-size: 10px; color: var(--accent); letter-spacing: 0.15em; margin-bottom: 12px; }
        .box-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.02em; }
        .box-desc { font-size: 11px; color: var(--secondary); line-height: 1.8; margin-bottom: 28px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 16px; }
        .form-label { font-size: 9px; color: var(--secondary); letter-spacing: 0.1em; margin-bottom: 6px; }
        .form-input {
            width: 100%; padding: 12px 14px; border: 1px solid var(--border);
            background: var(--bg); font-family: var(--mono); font-size: 13px;
            color: var(--text); outline: none; transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--accent); }
        .strength-bar { height: 3px; background: var(--border); margin-top: 6px; }
        .strength-fill { height: 100%; width: 0%; transition: width 0.3s, background 0.3s; }
        .strength-label { font-size: 9px; color: var(--secondary); margin-top: 4px; }
        .btn-submit {
            width: 100%; padding: 14px; background: var(--text); color: var(--bg);
            border: none; font-family: var(--mono); font-size: 12px; font-weight: 600;
            cursor: pointer; letter-spacing: 0.08em; margin-top: 8px;
        }
        .btn-submit:hover { background: var(--accent); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-msg {
            font-size: 10px; padding: 10px 12px; border: 1px solid var(--border);
            display: none; margin-top: 14px;
        }
        .form-msg.error { border-color: #c0392b; color: #c0392b; background: #fdf0ef; }
        .form-msg.success { border-color: var(--accent); color: var(--accent); background: #fdf6f3; }
        .form-msg.show { display: block; }
        .invalid-wrap { text-align: center; padding: 60px 20px; }
        .invalid-wrap p { font-size: 12px; color: var(--secondary); margin-bottom: 20px; line-height: 1.8; }
        .btn-link {
            display: inline-block; padding: 12px 28px; background: var(--text);
            color: var(--bg); font-family: var(--mono); font-size: 12px;
            font-weight: 600; text-decoration: none;
        }
        .btn-link:hover { background: var(--accent); }


        /* ── TOOLTIP ── */
        #tip {
            position: fixed; pointer-events: none; z-index: 99999;
            background: var(--text); color: var(--bg);
            font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
            padding: 5px 9px; white-space: nowrap;
            opacity: 0; transition: opacity 0.15s;
        }
        #tip.show { opacity: 1; }

        /* ── RESPONSIVE ── */
        @media (max-width: 540px) {
            nav { padding: 14px 16px; }
            .wrap { padding: 24px 16px; }
        }
    </style>
</head>
<body>
<nav>
    <a href="index.html" class="nav-logo" data-tip="Go to home">ELLIE</a>
    <a href="auth.html" class="nav-back" data-tip="Back to login">← BACK_TO_LOGIN</a>
</nav>

<div class="wrap">
    <div class="box" id="box">
        <div style="font-size:11px;color:var(--secondary);">VERIFYING_LINK...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _sb = supabase.createClient(
        'https://zpwtdnpxmmabgkxzyxsj.supabase.co',
        'sb_publishable_zxERqa7B-E7zroqc1O9Tow_D_yxImgb'
    );

    const box = document.getElementById('box');

    // Supabase puts the session tokens in the URL hash after redirect
    _sb.auth.onAuthStateChange((event, session) => {
        if (event === 'PASSWORD_RECOVERY') {
            renderForm();
        }
    });

    // Also check immediately in case already resolved
    _sb.auth.getSession().then(({ data }) => {
        if (data.session) {
            renderForm();
        } else {
            // wait briefly for onAuthStateChange to fire
            setTimeout(() => {
                if (box.innerHTML.includes('VERIFYING')) {
                    renderInvalid();
                }
            }, 2000);
        }
    });

    function renderForm() {
        box.innerHTML = `
            <div class="box-tag">// RESET_PASSWORD</div>
            <div class="box-title">Set a new password</div>
            <div class="box-desc">Choose a strong password for your Ellie account.</div>
            <div class="form-group">
                <label class="form-label">NEW_PASSWORD</label>
                <input class="form-input" type="password" id="new-pass" placeholder="Min. 8 characters" oninput="checkStrength(this.value)" data-tip="Enter your new password">
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                <div class="strength-label" id="strength-label">—</div>
            </div>
            <div class="form-group">
                <label class="form-label">CONFIRM_PASSWORD</label>
                <input class="form-input" type="password" id="confirm-pass" placeholder="••••••••" data-tip="Re-enter your new password">
            </div>
            <button class="btn-submit" id="submit-btn" onclick="updatePassword()" data-tip="Set your new password">$ UPDATE_PASSWORD →</button>
            <div class="form-msg" id="reset-msg"></div>
        `;
    }

    function renderInvalid() {
        box.innerHTML = `
            <div class="invalid-wrap">
                <div class="box-tag">// LINK_INVALID_OR_EXPIRED</div>
                <p>This password reset link is invalid or has expired.<br>Please request a new one.</p>
                <a href="auth.html" class="btn-link" data-tip="Go back and request a new reset link">$ REQUEST_NEW_LINK →</a>
            </div>
        `;
    }

    async function updatePassword() {
        const pass = document.getElementById('new-pass').value;
        const confirm = document.getElementById('confirm-pass').value;
        const btn = document.getElementById('submit-btn');

        if (pass.length < 8) return showMsg('error', 'ERR: Minimum 8 characters.');
        if (pass !== confirm) return showMsg('error', 'ERR: Passwords do not match.');

        btn.disabled = true;
        showMsg('success', 'UPDATING...');

        const { error } = await _sb.auth.updateUser({ password: pass });
        if (error) {
            btn.disabled = false;
            return showMsg('error', 'ERR: ' + error.message);
        }

        showMsg('success', 'PASSWORD_UPDATED ✓ — redirecting...');
        setTimeout(() => window.location.href = 'browse.html', 1500);
    }

    function showMsg(type, text) {
        const el = document.getElementById('reset-msg');
        if (!el) return;
        el.className = 'form-msg ' + type + ' show';
        el.textContent = text;
    }

    function checkStrength(val) {
        const fill = document.getElementById('strength-fill');
        const label = document.getElementById('strength-label');
        if (!fill) return;
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const levels = [
            { w: '25%', c: '#c0392b', t: 'WEAK' },
            { w: '50%', c: '#e67e22', t: 'FAIR' },
            { w: '75%', c: '#f1c40f', t: 'GOOD' },
            { w: '100%', c: '#27ae60', t: 'STRONG' },
        ];
        const l = levels[Math.max(0, score - 1)];
        fill.style.width = val ? l.w : '0%';
        fill.style.background = l.c;
        label.textContent = val ? l.t : '—';
    }
</script>
<div id="tip"></div>
<script>
(function(){
    const tip = document.getElementById('tip');
    let cur = null;
    document.addEventListener('mouseover', e => {
        const el = e.target.closest('[data-tip]');
        if (!el) return;
        cur = el;
        tip.textContent = el.dataset.tip;
        tip.classList.add('show');
    });
    document.addEventListener('mouseout', e => {
        if (cur && !cur.contains(e.relatedTarget)) {
            tip.classList.remove('show');
            cur = null;
        }
    });
    document.addEventListener('mousemove', e => {
        if (!cur) return;
        const x = e.clientX + 14, y = e.clientY + 14;
        const tw = tip.offsetWidth, th = tip.offsetHeight;
        tip.style.left = (x + tw > window.innerWidth ? e.clientX - tw - 6 : x) + 'px';
        tip.style.top  = (y + th > window.innerHeight ? e.clientY - th - 6 : y) + 'px';
    });
    document.addEventListener('scroll', () => tip.classList.remove('show'), true);
})();
</script>
</body>
</html>
