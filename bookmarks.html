<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=1280">
    <title>Ellie — Bookmarks</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f9f7;
            --text: #1a1a18;
            --secondary: #6b6b68;
            --border: #e5e5e1;
            --accent: #d97757;
            --mono: 'IBM Plex Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: var(--mono); min-height: 100vh;
            display: flex; flex-direction: column;
            min-width: 1024px;
        }

        /* NAV */
        nav {
            padding: 14px 40px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg); position: sticky; top: 0; z-index: 10;
        }
        .nav-logo { font-size: 13px; font-weight: 600; color: var(--accent); cursor: pointer; text-decoration: none; }
        .nav-links { display: flex; gap: 4px; }
        .nav-link {
            padding: 6px 12px; border: 1px solid transparent;
            background: none; font-family: var(--mono); font-size: 10px;
            color: var(--secondary); cursor: pointer; letter-spacing: 0.05em;
            text-decoration: none; display: inline-block;
        }
        .nav-link:hover { color: var(--accent); border-color: var(--border); }
        .nav-link.active { color: var(--text); border-color: var(--border); }

        /* PAGE */
        .page-header {
            padding: 32px 40px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            max-width: 1480px; width: 100%; margin: 0 auto;
        }
        .page-title { font-size: 20px; font-weight: 600; }
        .page-title span { color: var(--accent); margin-right: 10px; }
        .page-count { font-size: 11px; color: var(--secondary); }
        .clear-btn {
            padding: 8px 16px; border: 1px solid var(--border);
            background: none; font-family: var(--mono); font-size: 10px;
            color: var(--secondary); cursor: pointer;
        }
        .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

        .page-body { flex: 1; padding: 24px 40px; max-width: 1480px; width: 100%; margin: 0 auto; }

        /* GRID */
        .bm-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1px; background: var(--border); border: 1px solid var(--border);
        }
        .bm-card {
            background: var(--bg); padding: 12px;
            display: flex; flex-direction: column; min-height: 200px; cursor: pointer;
        }
        .bm-card:hover { background: #f1f1ee; }
        .bm-img {
            width: 100%; aspect-ratio: 16/9; background: #eeebe6;
            margin-bottom: 10px; border: 1px solid var(--border); overflow: hidden;
        }
        .bm-img img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) sepia(0.2); opacity: 0.8; display: block; }
        .bm-id { font-size: 8px; color: var(--secondary); margin-bottom: 3px; }
        .bm-name { font-size: 10px; font-weight: 600; margin-bottom: 8px; height: 28px; overflow: hidden; }
        .bm-remove {
            margin-top: auto; padding: 7px; border: 1px solid var(--border);
            background: none; font-family: var(--mono); font-size: 9px;
            color: var(--secondary); cursor: pointer; text-align: center;
        }
        .bm-remove:hover { border-color: var(--accent); color: var(--accent); }

        /* EMPTY */
        .bm-empty {
            text-align: center; padding: 100px 20px;
            font-size: 12px; color: var(--secondary);
        }
        .bm-empty-icon { font-size: 36px; margin-bottom: 16px; }
        .bm-empty a { color: var(--accent); text-decoration: none; }
        .bm-empty a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<script>
    if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        sessionStorage.setItem('ellie_dest', 'bookmarks.html');
        window.location.replace('desktop-only.html');
    }
</script>


<div class="page-header">
    <div>
        <div class="page-title"><span>★</span>BOOKMARKS</div>
        <div class="page-count" id="bm-count">0 saved sounds</div>
    </div>
    <button class="clear-btn" onclick="clearAll()">✕ CLEAR_ALL</button>
</div>

<div class="page-body">
    <div id="bm-content"></div>
</div>

<script>
    let favorites = JSON.parse(localStorage.getItem('fs_favs') || '[]');

    function render() {
        const content = document.getElementById('bm-content');
        document.getElementById('bm-count').textContent = `${favorites.length} saved sound${favorites.length !== 1 ? 's' : ''}`;

        if (!favorites.length) {
            content.innerHTML = `
                <div class="bm-empty">
                    <div class="bm-empty-icon">☆</div>
                    No bookmarks yet.<br><br>
                    <a href="browse.html">Browse sounds →</a> and star any track to save it here.
                </div>`;
            return;
        }

        const grid = document.createElement('div');
        grid.className = 'bm-grid';

        favorites.forEach(fav => {
            const imgUrl = `https://picsum.photos/seed/${fav.id}/600/400?grayscale`;
            const card = document.createElement('div');
            card.className = 'bm-card';
            card.innerHTML = `
                <div class="bm-img"><img src="${imgUrl}" loading="lazy"></div>
                <div class="bm-id">#API_FS_${fav.id}</div>
                <div class="bm-name">${fav.name.toLowerCase().replace(/\s+/g,'_').substring(0,40)}</div>
                <button class="bm-remove" onclick="event.stopPropagation(); remove(${fav.id})">✕ REMOVE</button>
            `;
            card.onclick = () => {
                window.location.href = 'browse.html'open=${fav.id}`;
            };
            grid.appendChild(card);
        });

        content.innerHTML = '';
        content.appendChild(grid);
    }

    function remove(id) {
        favorites = favorites.filter(f => f.id !== id);
        localStorage.setItem('fs_favs', JSON.stringify(favorites));
        render();
    }

    function clearAll() {
        if (!favorites.length) return;
        if (confirm('Remove all bookmarks?')) {
            favorites = [];
            localStorage.setItem('fs_favs', JSON.stringify(favorites));
            render();
        }
    }

    render();
</script>
</body>
</html>
