<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=1280">
    <title>Ellie — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f9f7;
            --text: #1a1a18;
            --secondary: #6b6b68;
            --border: #e5e5e1;
            --accent: #d97757;
            --mono: 'IBM Plex Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: var(--mono); min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* NAV */
        nav {
            padding: 18px 40px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-logo { font-size: 13px; font-weight: 600; color: var(--accent); text-decoration: none; }
        .nav-back { font-size: 11px; color: var(--secondary); text-decoration: none; }
        .nav-back:hover { color: var(--accent); }

        /* LAYOUT */
        .auth-wrap {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }
        .auth-box {
            width: 100%; max-width: 420px;
        }

        /* TABS */
        .auth-tabs {
            display: flex; gap: 1px; background: var(--border);
            border: 1px solid var(--border); margin-bottom: 32px;
        }
        .auth-tab {
            flex: 1; padding: 12px; text-align: center;
            font-family: var(--mono); font-size: 11px; font-weight: 600;
            cursor: pointer; background: var(--bg); color: var(--secondary);
            border: none; letter-spacing: 0.08em;
        }
        .auth-tab.active { background: var(--text); color: var(--bg); }
        .auth-tab:hover:not(.active) { color: var(--accent); }

        /* FORM */
        .auth-form { display: none; flex-direction: column; gap: 16px; }
        .auth-form.active { display: flex; }

        .form-label {
            font-size: 9px; color: var(--secondary); letter-spacing: 0.1em;
            margin-bottom: 6px; display: block;
        }
        .form-input {
            width: 100%; padding: 12px 14px;
            border: 1px solid var(--border); background: var(--bg);
            font-family: var(--mono); font-size: 13px; color: var(--text);
            outline: none; transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: var(--border); }

        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }

        .form-group { display: flex; flex-direction: column; }

        .form-hint { font-size: 9px; color: var(--secondary); margin-top: 5px; }

        .form-check {
            display: flex; align-items: flex-start; gap: 10px;
            font-size: 10px; color: var(--secondary); cursor: pointer;
        }
        .form-check input[type=checkbox] {
            width: 14px; height: 14px; margin-top: 1px; flex-shrink: 0;
            accent-color: var(--accent); cursor: pointer;
        }
        .form-check a { color: var(--accent); text-decoration: none; }
        .form-check a:hover { text-decoration: underline; }

        .btn-submit {
            width: 100%; padding: 14px;
            background: var(--text); color: var(--bg);
            border: none; font-family: var(--mono); font-size: 12px;
            font-weight: 600; cursor: pointer; letter-spacing: 0.08em;
            margin-top: 4px;
        }
        .btn-submit:hover { background: var(--accent); }

        .divider {
            display: flex; align-items: center; gap: 12px;
            font-size: 9px; color: var(--secondary); letter-spacing: 0.1em;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        .btn-oauth {
            width: 100%; padding: 12px;
            border: 1px solid var(--border); background: none;
            font-family: var(--mono); font-size: 11px; color: var(--text);
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-oauth:hover { border-color: var(--accent); color: var(--accent); }
        .btn-oauth svg { flex-shrink: 0; }

        .form-footer {
            text-align: center; font-size: 10px; color: var(--secondary); margin-top: 8px;
        }
        .form-footer a { color: var(--accent); text-decoration: none; cursor: pointer; }
        .form-footer a:hover { text-decoration: underline; }

        /* error / success */
        .form-msg {
            font-size: 10px; padding: 10px 12px; border: 1px solid var(--border);
            display: none;
        }
        .form-msg.error { border-color: #c0392b; color: #c0392b; background: #fdf0ef; }
        .form-msg.success { border-color: var(--accent); color: var(--accent); background: #fdf6f3; }
        .form-msg.show { display: block; }

        /* password strength */
        .strength-bar { height: 3px; background: var(--border); margin-top: 6px; }
        .strength-fill { height: 100%; width: 0%; transition: width 0.3s, background 0.3s; }

        body { min-width: 1024px; }
    </style>
</head>
<body>
<script>
    if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        sessionStorage.setItem('ellie_dest', 'auth.html');
        window.location.replace('desktop-only.html');
    }
</script>

<nav>
    <a href="index.html" class="nav-logo"><img src="logo.svg" alt="ELLIE" height="32" style="display:block;"></a>
    <a href="index.html" class="nav-back">← BACK_TO_HOME</a>
</nav>

<div class="auth-wrap">
    <div class="auth-box">

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">LOGIN</button>
            <button class="auth-tab" onclick="switchTab('signup')">SIGN_UP</button>
        </div>

        <!-- LOGIN FORM -->
        <form class="auth-form active" id="login-form" onsubmit="handleLogin(event)">
            <div id="login-msg" class="form-msg"></div>

            <div class="form-group">
                <label class="form-label">EMAIL_ADDRESS</label>
                <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">PASSWORD</label>
                <input class="form-input" type="password" id="login-pass" placeholder="••••••••" required>
                <span class="form-hint"><a href="#" style="color:var(--accent);text-decoration:none;" onclick="showForgot()">FORGOT_PASSWORD?</a></span>
            </div>

            <div class="form-check">
                <input type="checkbox" id="remember">
                <label for="remember">Keep me logged in</label>
            </div>

            <button class="btn-submit" type="submit">$ LOGIN →</button>

            <div class="divider">OR</div>

            <button class="btn-oauth" type="button" onclick="oauthGoogle()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                CONTINUE_WITH_GOOGLE
            </button>

            <div class="form-footer">
                No account? <a onclick="switchTab('signup')">SIGN_UP</a>
            </div>
        </form>

        <!-- SIGNUP FORM -->
        <form class="auth-form" id="signup-form" onsubmit="handleSignup(event)">
            <div id="signup-msg" class="form-msg"></div>

            <div class="form-group">
                <label class="form-label">EMAIL_ADDRESS</label>
                <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">PASSWORD</label>
                <input class="form-input" type="password" id="signup-pass" placeholder="Min. 8 characters" required oninput="checkStrength(this.value)">
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                <span class="form-hint" id="strength-label">—</span>
            </div>

            <div class="form-group">
                <label class="form-label">CONFIRM_PASSWORD</label>
                <input class="form-input" type="password" id="signup-confirm" placeholder="••••••••" required>
            </div>

            <div class="form-check">
                <input type="checkbox" id="agree" required>
                <label for="agree">I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="terms.html#privacy" target="_blank">Privacy Policy</a></label>
            </div>

            <button class="btn-submit" type="submit">$ CREATE_ACCOUNT →</button>

            <div class="divider">OR</div>

            <button class="btn-oauth" type="button" onclick="oauthGoogle()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                CONTINUE_WITH_GOOGLE
            </button>

            <div class="form-footer">
                Already have an account? <a onclick="switchTab('login')">LOGIN</a>
            </div>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _supabase = supabase.createClient(
        'https://zpwtdnpxmmabgkxzyxsj.supabase.co',
        'sb_publishable_zxERqa7B-E7zroqc1O9Tow_D_yxImgb'
    );

    _supabase.auth.getSession().then(({ data }) => {
        if (data.session) window.location.href = 'browse.html';
    });

    function switchTab(tab) {
        document.querySelectorAll('.auth-tab').forEach((t, i) => {
            t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
        });
        document.getElementById('login-form').classList.toggle('active', tab === 'login');
        document.getElementById('signup-form').classList.toggle('active', tab === 'signup');
    }

    function showMsg(id, type, text) {
        const el = document.getElementById(id);
        el.className = 'form-msg ' + type + ' show';
        el.textContent = text;
    }

    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        showMsg('login-msg', 'success', 'AUTHENTICATING...');
        const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
        if (error) return showMsg('login-msg', 'error', 'ERR: ' + error.message);
        showMsg('login-msg', 'success', 'LOGIN_SUCCESS — redirecting...');
        setTimeout(() => window.location.href = 'browse.html', 1000);
    }

    async function handleSignup(e) {
        e.preventDefault();
        const email = document.getElementById('signup-email').value;
        const pass = document.getElementById('signup-pass').value;
        const confirm = document.getElementById('signup-confirm').value;
        if (pass.length < 8) return showMsg('signup-msg', 'error', 'ERR: Password must be at least 8 characters.');
        if (pass !== confirm) return showMsg('signup-msg', 'error', 'ERR: Passwords do not match.');
        showMsg('signup-msg', 'success', 'CREATING_ACCOUNT...');
        const { error } = await _supabase.auth.signUp({ email, password: pass });
        if (error) return showMsg('signup-msg', 'error', 'ERR: ' + error.message);
        showMsg('signup-msg', 'success', 'ACCOUNT_CREATED — check your email to confirm.');
    }

    async function showForgot() {
        const email = document.getElementById('login-email').value;
        if (!email) return showMsg('login-msg', 'error', 'ERR: Enter your email first.');
        const { error } = await _supabase.auth.resetPasswordForEmail(email);
        if (error) return showMsg('login-msg', 'error', 'ERR: ' + error.message);
        showMsg('login-msg', 'success', 'RESET_LINK — check your email.');
    }

    async function oauthGoogle() {
        const { error } = await _supabase.auth.signInWithOAuth({ provider: 'google' });
        if (error) alert('ERR: ' + error.message);
    }

    function checkStrength(val) {
        const fill = document.getElementById('strength-fill');
        const label = document.getElementById('strength-label');
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const levels = [
            { w: '25%', c: '#c0392b', t: 'WEAK' },
            { w: '50%', c: '#e67e22', t: 'FAIR' },
            { w: '75%', c: '#f1c40f', t: 'GOOD' },
            { w: '100%', c: '#27ae60', t: 'STRONG' },
        ];
        const l = levels[Math.max(0, score - 1)];
        fill.style.width = val ? l.w : '0%';
        fill.style.background = l.c;
        label.textContent = val ? l.t : '--';
    }
</script>
</body>
</html>
